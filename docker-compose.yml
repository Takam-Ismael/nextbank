version: '3.8'

services:
  # 1. PostgreSQL Database (used on VPS; locally you use your Windows pgAdmin)
  accounts-db:
    image: postgres:15-alpine
    container_name: accounts-db
    networks:
      - nextbank-network
    environment:
      POSTGRES_DB: accounts_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # 2. Accounts Service
  accounts-service:
    build: 
      context: ./Backend-Services/accounts-service
      dockerfile: Dockerfile
    container_name: accounts-service
    networks:
      - nextbank-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://accounts-db:5432/accounts_db}
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-secret_key_placeholder_for_nextbank_digital_platform_2024}
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:8087
      CARDS_SERVICE_URL: http://cards-service:8086
    restart: always

  # 3. Cards Service
  cards-service:
    build: 
      context: ./Backend-Services/cards-service
      dockerfile: Dockerfile
    container_name: cards-service
    networks:
      - nextbank-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://accounts-db:5432/accounts_db}
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-secret_key_placeholder_for_nextbank_digital_platform_2024}
      ACCOUNTS_SERVICE_URL: http://accounts-service:8085
      NOTIFICATIONS_SERVICE_URL: http://notifications-service:8087
    depends_on:
      - accounts-service
    restart: always

  # 4. Notifications Service
  notifications-service:
    build: 
      context: ./Backend-Services/notifications-service
      dockerfile: Dockerfile
    container_name: notifications-service
    networks:
      - nextbank-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://accounts-db:5432/accounts_db}
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-secret_key_placeholder_for_nextbank_digital_platform_2024}
      FIREBASE_ENABLED: "false"
    restart: always

  # 5. Kong API Gateway
  nextbank-gateway:
    image: kong:latest
    container_name: nextbank-gateway
    networks:
      - nextbank-network
    volumes:
      - ./kong.yml:/opt/kong/kong.yml
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - accounts-service
      - cards-service
      - notifications-service
    restart: always

networks:
  nextbank-network:
    driver: bridge

volumes:
  pgdata:
