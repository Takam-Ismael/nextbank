version: '3.8'

services:
  # 1. PostgreSQL Database
  accounts-db:
    image: postgres:15-alpine
    container_name: accounts-db
    networks:
      - nextbank-network
    environment:
      POSTGRES_DB: accounts_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # 2. Spring Boot Backend
  accounts-service:
    build: 
      context: ./Backend-Services/accounts-service
      dockerfile: Dockerfile
    container_name: accounts-service
    networks:
      - nextbank-network
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://accounts-db:5432/accounts_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: ${JWT_SECRET:-secret_key_placeholder_for_nextbank_digital_platform_2024}
      HTTP_SMS_KEY: ${HTTP_SMS_KEY:-PLACEHOLDER_KEY}
    depends_on:
      - accounts-db
    restart: always

  # 3. Kong API Gateway
  nextbank-gateway:
    image: kong:3.4-alpine
    container_name: nextbank-gateway
    networks:
      - nextbank-network
    volumes:
      - ./kong.yml:/opt/kong/kong.yml
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /opt/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - accounts-service
    restart: always

networks:
  nextbank-network:
    driver: bridge

volumes:
  pgdata:
