server:
  port: 8086

spring:
  application:
    name: cards-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cards_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:secret_key_placeholder_for_nextbank_digital_platform_2024}
  expiration: 86400000 # 24 hours

accounts-service:
  url: ${ACCOUNTS_SERVICE_URL:http://localhost:8084}

notifications-service:
  url: ${NOTIFICATIONS_SERVICE_URL:http://localhost:8087}
