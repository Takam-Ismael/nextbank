_format_version: "3.0"
_transform: true

services:
  - name: accounts-service
    url: http://accounts-service:8085
    routes:
      - name: accounts-route
        strip_path: false
        paths:
          - /accounts
          - /api # Support both path versions
          - /auth

  - name: cards-service
    url: http://cards-service:8086
    routes:
      - name: cards-route
        strip_path: false
        paths:
          - /api/cards

  - name: notifications-service
    url: http://notifications-service:8087
    routes:
      - name: notifications-route
        strip_path: false
        paths:
          - /api/notifications

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      exposed_headers:
        - Authorization
      credentials: false
      max_age: 3600
