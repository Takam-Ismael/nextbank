_format_version: "3.0"
_transform: true

services:
  - name: accounts-service
    url: http://accounts-service:8081
    routes:
      - name: accounts-route
        paths:
          - /accounts

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600
